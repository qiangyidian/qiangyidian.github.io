<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文本转 Word 净化器 - 论文专版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 默认预览区样式 */
        .preview-content {
            font-size: 14px; line-height: 1.6; color: #333; padding: 20px;
        }
        /* 当选择论文模式时，预览区也尽量模拟论文的视觉效果 */
        .preview-content.thesis-mode {
            font-family: "Times New Roman", "SimSun", "宋体", serif;
            font-size: 16px; /* 模拟小四 */
            line-height: 1.5;
        }
        .preview-content.thesis-mode p { text-indent: 2em; margin-bottom: 0; }
        .preview-content.thesis-mode h1 { font-family: "SimHei", "黑体", sans-serif; font-size: 21.3px; /* 模拟三号 */ font-weight: bold; text-align: center; margin-top: 1em; margin-bottom: 1em; text-indent: 0; }
        .preview-content.thesis-mode h2 { font-family: "SimHei", "黑体", sans-serif; font-size: 20px; /* 模拟小三 */ font-weight: bold; margin-top: 8px; margin-bottom: 8px; text-indent: 0; }
        .preview-content.thesis-mode h3 { font-family: "SimHei", "黑体", sans-serif; font-size: 18.7px; /* 模拟四号 */ font-weight: bold; margin-top: 4px; margin-bottom: 4px; text-indent: 0; }
        .preview-content.thesis-mode li { margin-left: 2em; text-indent: 0; }
        
        /* 默认通用模式样式 */
        .preview-content.standard-mode { font-family: -apple-system, sans-serif; }
        .preview-content.standard-mode h1, .preview-content.standard-mode h2, .preview-content.standard-mode h3 { font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
        .preview-content.standard-mode h1 { font-size: 24px; }
        .preview-content.standard-mode h2 { font-size: 20px; border-bottom: 1px solid #eee; }
        .preview-content.standard-mode p { margin-bottom: 1em; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-10 relative">
        <div>
            <h1 class="text-2xl font-bold text-blue-600">AI 文本净化器</h1>
            <p class="text-sm text-gray-500 mt-1">自动识别 Markdown 层级，完美映射 Word 论文字号与段落格式</p>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- 新增：格式模板选择器 -->
            <div class="flex items-center bg-gray-100 rounded border border-gray-200 p-1">
                <span class="text-sm text-gray-600 px-2 font-medium">目标排版：</span>
                <select id="formatTemplate" class="text-sm bg-white border border-gray-300 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                    <option value="ncwu">论文格式 (宋体小四/黑体标题)</option>
                    <option value="standard">通用办公格式 (微软雅黑)</option>
                </select>
            </div>

            <button id="copyBtn" class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold py-2 px-6 rounded shadow transition-all duration-150 flex items-center gap-2 cursor-pointer select-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                按此格式复制
            </button>
        </div>
    </header>

    <div id="toast" style="display: none; position: fixed; top: 80px; right: 24px; z-index: 9999; padding: 12px 24px; border-radius: 8px; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: opacity 0.3s;">
        提示信息
    </div>

    <main class="flex-1 flex overflow-hidden p-6 gap-6">
        <div class="flex-1 flex flex-col bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
            <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 font-semibold text-gray-700">1. 在此粘贴 AI 文本 (使用 # 划分标题层级)</div>
            <textarea id="sourceText" class="flex-1 w-full p-4 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="尝试粘贴以下内容测试效果：&#10;&#10;# 第1章 绪论&#10;&#10;## 1.1 研究背景与意义&#10;&#10;随着人工智能技术的不断发展，自然语言处理大模型在日常办公中扮演着越来越重要的角色。然而，跨平台文本复制经常导致格式错乱...&#10;&#10;### 1.1.1 存在的主要问题&#10;&#10;首先，网页端复杂的 CSS 样式无法被 Word 完全兼容。其次，深色模式会导致粘贴出现黑色背景块..."></textarea>
        </div>
        <div class="flex-1 flex flex-col bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
            <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 font-semibold text-gray-700 flex justify-between items-center">
                <span>2. 转换后的纯净预览</span>
            </div>
            <!-- 默认加上 thesis-mode 类名，因为下拉框默认是论文模式 -->
            <div id="previewArea" class="flex-1 overflow-y-auto preview-content thesis-mode">
                <div class="text-gray-400 text-center mt-20 italic font-sans" style="text-indent: 0;">左侧输入内容后，这里会实时显示预览...</div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sourceText = document.getElementById('sourceText');
            const previewArea = document.getElementById('previewArea');
            const copyBtn = document.getElementById('copyBtn');
            const templateSelect = document.getElementById('formatTemplate');
            const toast = document.getElementById('toast');
            let toastTimer;

            marked.setOptions({ breaks: false, gfm: true });

            // 监听输入，实时渲染
            sourceText.addEventListener('input', updatePreview);
            // 监听模板切换，更新预览区样式
            templateSelect.addEventListener('change', () => {
                if (templateSelect.value === 'ncwu') {
                    previewArea.className = 'flex-1 overflow-y-auto preview-content thesis-mode';
                } else {
                    previewArea.className = 'flex-1 overflow-y-auto preview-content standard-mode';
                }
                updatePreview();
            });

            function updatePreview() {
                const text = sourceText.value;
                if (!text.trim()) {
                    previewArea.innerHTML = '<div class="text-gray-400 text-center mt-20 italic font-sans" style="text-indent: 0;">左侧输入内容后，这里会实时显示预览...</div>';
                    return;
                }
                previewArea.innerHTML = marked.parse(text);
            }

            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
                toast.style.display = 'block';
                toast.style.opacity = '1';
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => { toast.style.display = 'none'; }, 300);
                }, 3000);
            }

            copyBtn.addEventListener('click', async () => {
                const text = sourceText.value;
                if (!text.trim()) {
                    showToast('请先在左侧输入内容！', true);
                    return;
                }

                const rawHtml = marked.parse(text);
                const selectedFormat = templateSelect.value;
                let cssStyles = "";

                // 根据选择的模板，注入严格对应的 Word pt(磅) 样式
                if (selectedFormat === 'ncwu') {
                    // 华北水利水电大学格式映射
                    cssStyles = `
                        /* 全局与正文：宋体小四 (12pt), 英文 Times New Roman, 1.5倍行距, 首行缩进2字符 (24pt) */
                        body, p, div { 
                            font-family: "Times New Roman", "SimSun", "宋体", serif; 
                            font-size: 12pt; 
                            line-height: 1.5; 
                            color: #000000; 
                            background-color: #ffffff; 
                            margin-top: 0; 
                            margin-bottom: 0;
                        }
                        p { text-indent: 24pt; }
                        
                        /* 一级标题 (章)：三号黑体 (16pt)，居中，约占2行 (用margin模拟) */
                        h1 { 
                            font-family: "SimHei", "黑体", sans-serif; 
                            font-size: 16pt; 
                            font-weight: bold; 
                            text-align: center; 
                            margin-top: 24pt; 
                            margin-bottom: 24pt; 
                            text-indent: 0;
                            color: #000000;
                        }
                        
                        /* 二级标题 (节)：小三号黑体 (15pt)，段前6磅，段后6磅 */
                        h2 { 
                            font-family: "SimHei", "黑体", sans-serif; 
                            font-size: 15pt; 
                            font-weight: bold; 
                            margin-top: 6pt; 
                            margin-bottom: 6pt; 
                            text-indent: 0;
                            color: #000000;
                        }
                        
                        /* 三级标题 (条)：四号黑体 (14pt)，段前3磅，段后3磅 */
                        h3 { 
                            font-family: "SimHei", "黑体", sans-serif; 
                            font-size: 14pt; 
                            font-weight: bold; 
                            margin-top: 3pt; 
                            margin-bottom: 3pt; 
                            text-indent: 0;
                            color: #000000;
                        }

                        /* 列表和表格防止被首行缩进影响 */
                        ul, ol { text-indent: 0; margin-left: 24pt; font-size: 12pt; }
                        li { text-indent: 0; margin-bottom: 2pt; }
                        table { border-collapse: collapse; width: 100%; font-size: 12pt; text-indent: 0; }
                        th, td { border: 1pt solid #000000; padding: 4pt; text-indent: 0; }
                    `;
                } else {
                    // 默认通用办公格式
                    cssStyles = `
                        body, p, div, li { font-family: "Microsoft YaHei", sans-serif; font-size: 11pt; color: #000; background-color: #fff; line-height: 1.5; }
                        h1, h2, h3 { font-weight: bold; color: #000; }
                        h1 { font-size: 18pt; margin-top: 12pt; margin-bottom: 6pt; }
                        h2 { font-size: 14pt; margin-top: 10pt; margin-bottom: 4pt; }
                        p { margin-bottom: 10pt; }
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid #000; padding: 5px; }
                    `;
                }
                
                const wordFriendlyHtml = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">
                    <head>
                        <meta charset="utf-8">
                        <style>${cssStyles}</style>
                    </head>
                    <body>${rawHtml}</body>
                    </html>
                `;

                try {
                    if (navigator.clipboard && window.ClipboardItem) {
                        const htmlBlob = new Blob([wordFriendlyHtml], { type: 'text/html' });
                        const textBlob = new Blob([text], { type: 'text/plain' });
                        await navigator.clipboard.write([new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob })]);
                        showToast(`复制成功！已应用 [${templateSelect.options[templateSelect.selectedIndex].text}]`);
                        return;
                    }
                } catch (err) {
                    console.warn("方案一失败，准备启动备用方案", err);
                }

                try {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = wordFriendlyHtml;
                    tempDiv.style.position = 'fixed';
                    tempDiv.style.left = '-9999px';
                    document.body.appendChild(tempDiv);

                    const selection = window.getSelection();
                    const range = document.createRange();
                    range.selectNodeContents(tempDiv);
                    selection.removeAllRanges();
                    selection.addRange(range);

                    const successful = document.execCommand('copy');
                    
                    selection.removeAllRanges();
                    document.body.removeChild(tempDiv);

                    if (successful) {
                        showToast(`复制成功 (备用模式)！已应用格式。`);
                    } else {
                        throw new Error('execCommand 返回 false');
                    }
                } catch (err) {
                    showToast('复制失败，请重试或检查浏览器权限', true);
                }
            });

            // 页面加载时自动填入示例文本并渲染
            sourceText.value = sourceText.getAttribute('placeholder');
            updatePreview();
        });
    </script>
</body>
</html>
