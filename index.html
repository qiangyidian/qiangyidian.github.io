<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文本转 Word 净化器</title>
    <!-- 引入 Tailwind CSS 用于快速构建美观的界面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 highlight.js 样式，用于稍微美化一下预览区的代码 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
    
    <style>
        /* * 这里定义的是"预览区"的样式，它不仅仅是为了网页上好看，
         * 更重要的是，在复制到剪贴板时，我们会把这些基础样式内联进去，
         * 以便 Word 能更好地识别排版。
         */
        .preview-content {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #333333;
        }
        .preview-content h1, .preview-content h2, .preview-content h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: bold;
            color: #111111;
        }
        .preview-content h1 { font-size: 24px; }
        .preview-content h2 { font-size: 20px; border-bottom: 1px solid #eaeaea; padding-bottom: 0.3em; }
        .preview-content h3 { font-size: 18px; }
        .preview-content p {
            margin-top: 0;
            margin-bottom: 1em;
        }
        .preview-content ul, .preview-content ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }
        .preview-content li {
            margin-bottom: 0.25em;
        }
        .preview-content pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
            font-family: Consolas, "Courier New", monospace;
            border: 1px solid #e1e4e8;
            margin-bottom: 1em;
        }
        .preview-content code {
            font-family: Consolas, "Courier New", monospace;
            background-color: #rgba(27,31,35,0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
        .preview-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 1em 0;
        }
        .preview-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
        }
        .preview-content table th, .preview-content table td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }
        .preview-content table th {
            font-weight: bold;
            background-color: #f6f8fa;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-10 relative">
        <div>
            <h1 class="text-2xl font-bold text-blue-600">AI 文本净化器</h1>
            <p class="text-sm text-gray-500 mt-1">解决 AI 对话直接粘贴到 Word 排版错乱的问题</p>
        </div>
        <button id="copyBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition duration-200 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            一键复制为 Word 友好格式
        </button>
    </header>

    <!-- 状态提示 Toast -->
    <div id="toast" class="fixed top-20 right-6 bg-green-500 text-white px-4 py-2 rounded shadow-lg transform transition-transform duration-300 translate-y-[-150%] opacity-0 z-50">
        复制成功！现在去 Word 中按 Ctrl+V 粘贴吧。
    </div>

    <!-- 主体区域：左右分栏 -->
    <main class="flex-1 flex overflow-hidden p-6 gap-6">
        
        <!-- 左侧：输入区 -->
        <div class="flex-1 flex flex-col bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
            <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 font-semibold text-gray-700">
                1. 在此粘贴 AI 的原始文本 (支持 Markdown)
            </div>
            <textarea id="sourceText" class="flex-1 w-full p-4 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请从 ChatGPT、Gemini 等网页复制内容，然后粘贴到这里...&#10;&#10;例如：&#10;## 这是一个标题&#10;这是一段**加粗**的文字。"></textarea>
        </div>

        <!-- 右侧：预览区 -->
        <div class="flex-1 flex flex-col bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
            <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 font-semibold text-gray-700 flex justify-between items-center">
                <span>2. 转换后的纯净预览</span>
                <span class="text-xs font-normal text-gray-500 border border-gray-300 rounded px-2 py-1 bg-white">干净 HTML</span>
            </div>
            <!-- 这里用于显示解析后的内容 -->
            <div id="previewArea" class="flex-1 p-6 overflow-y-auto preview-content">
                <div class="text-gray-400 text-center mt-20 italic">
                    左侧输入内容后，这里会实时显示预览...
                </div>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sourceText = document.getElementById('sourceText');
            const previewArea = document.getElementById('previewArea');
            const copyBtn = document.getElementById('copyBtn');
            const toast = document.getElementById('toast');

            // 配置 marked，使其不要转换换行为 <br>，保持原生段落感，这对 Word 更好
            marked.setOptions({
                breaks: false,
                gfm: true
            });

            // 监听输入，实时渲染预览
            sourceText.addEventListener('input', updatePreview);

            function updatePreview() {
                const text = sourceText.value;
                if (!text.trim()) {
                    previewArea.innerHTML = '<div class="text-gray-400 text-center mt-20 italic">左侧输入内容后，这里会实时显示预览...</div>';
                    return;
                }
                
                // 使用 marked 将 Markdown 转为 HTML
                const htmlContent = marked.parse(text);
                previewArea.innerHTML = htmlContent;
            }

            // 核心逻辑：一键复制为 Word 友好格式
            copyBtn.addEventListener('click', async () => {
                const text = sourceText.value;
                if (!text.trim()) {
                    showToast('请先在左侧输入内容！', 'error');
                    return;
                }

                // 1. 获取干净的 HTML
                const rawHtml = marked.parse(text);

                // 2. 构造适合 Word 的 HTML 包装。
                // 关键点：Word 粘贴时依赖内联样式或全局样式来确定排版。
                // 我们构建一个完整的 HTML 文档结构，注入基础样式，确保黑色背景被剥离，字体大小一致。
                const wordFriendlyHtml = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="utf-8">
                        <title>Export</title>
                        <style>
                            /* 注入极简且 Word 友好的基础样式 */
                            body, div, p { 
                                font-family: "Microsoft YaHei", "宋体", sans-serif; 
                                font-size: 11pt; 
                                line-height: 1.5; 
                                color: #000000; 
                                background-color: #ffffff; /* 强行覆盖暗黑模式背景 */
                            }
                            h1 { font-size: 18pt; font-weight: bold; margin-top: 18pt; margin-bottom: 6pt; }
                            h2 { font-size: 16pt; font-weight: bold; margin-top: 16pt; margin-bottom: 4pt; }
                            h3 { font-size: 14pt; font-weight: bold; margin-top: 14pt; margin-bottom: 4pt; }
                            p { margin-top: 0; margin-bottom: 10pt; }
                            ul, ol { margin-top: 0; margin-bottom: 10pt; padding-left: 20pt; }
                            li { margin-bottom: 2pt; }
                            
                            /* 代码块处理，给一个浅灰色背景和边框，Word 可以识别 */
                            pre { 
                                background-color: #f6f8fa; 
                                border: 1px solid #cccccc;
                                padding: 10pt; 
                                font-family: "Consolas", monospace; 
                                font-size: 9pt;
                            }
                            code { 
                                font-family: "Consolas", monospace; 
                                font-size: 9pt;
                                background-color: #f6f8fa; 
                            }
                            
                            /* 表格处理 */
                            table { border-collapse: collapse; width: 100%; margin-bottom: 10pt; }
                            th, td { border: 1pt solid #000000; padding: 4pt 8pt; }
                            th { background-color: #f0f0f0; font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        ${rawHtml}
                    </body>
                    </html>
                `;

                try {
                    // 3. 使用现代 Clipboard API 写入两种格式
                    // 'text/html' 是给 Word 用的核心格式
                    // 'text/plain' 是作为后备（如果用户粘贴到不支持富文本的记事本里）
                    
                    const htmlBlob = new Blob([wordFriendlyHtml], { type: 'text/html' });
                    const textBlob = new Blob([text], { type: 'text/plain' });

                    const clipboardItem = new ClipboardItem({
                        'text/html': htmlBlob,
                        'text/plain': textBlob
                    });

                    await navigator.clipboard.write([clipboardItem]);
                    showToast('复制成功！现在去 Word 中按 Ctrl+V 粘贴吧。', 'success');
                } catch (err) {
                    console.error('复制失败:', err);
                    // 降级方案：如果浏览器不支持 Clipboard API 或权限被拒
                    fallbackCopyTextToClipboard(wordFriendlyHtml);
                }
            });

            // 显示动态提示
            function showToast(message, type = 'success') {
                toast.textContent = message;
                
                // 根据类型切换颜色
                if (type === 'error') {
                    toast.classList.remove('bg-green-500');
                    toast.classList.add('bg-red-500');
                } else {
                    toast.classList.remove('bg-red-500');
                    toast.classList.add('bg-green-500');
                }

                toast.classList.remove('translate-y-[-150%]', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-[-150%]', 'opacity-0');
                }, 3000);
            }

            // 降级复制方案 (依赖 document.execCommand，虽然老旧但在某些环境下必要)
            function fallbackCopyTextToClipboard(text) {
                 const textArea = document.createElement("textarea");
                 textArea.value = text;
                 // 避免滚动条跳动
                 textArea.style.top = "0";
                 textArea.style.left = "0";
                 textArea.style.position = "fixed";
                 document.body.appendChild(textArea);
                 textArea.focus();
                 textArea.select();

                 try {
                     const successful = document.execCommand('copy');
                     if(successful){
                         showToast('复制成功！现在去 Word 中按 Ctrl+V 粘贴吧。', 'success');
                     } else {
                         showToast('复制失败，可能是浏览器权限限制。', 'error');
                     }
                 } catch (err) {
                     showToast('无法复制，您的浏览器环境不支持此功能。', 'error');
                 }
                 document.body.removeChild(textArea);
             }
        });
    </script>
</body>
</html>
